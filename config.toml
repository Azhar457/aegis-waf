rate_limit_policies = []

[global]
port_http = 80
port_https = 443
max_body_size = 10485760
default_rate_limit = 600
log_dir = "./logs"
log_level = "verbose" # Options: "verbose" (log all requests), "anomaly" (log blocks & errors), "security" (log blocks only)

[tls]
mode = "local_ca"
cert_dir = "./certs"

[[vhosts]]
name = "dev.azharmtq.my.id"
hosts = ["dev.azharmtq.my.id"]
backend = "127.0.0.1:9090"
rate_limit_tiers = []
rules = ["SQLI-*", "XSS-*", "LFI-*", "RFI-*", "CMDI-*", "SSRF-*", "BOT-*"]
blocked_countries = []
geoblock_type = "Blocklist"
custom_rules = []
ssl = "Disabled"
max_body = "10MB"
rate_limit = "600 req/min"

[vhosts.logging]
enabled = true
db_path = "logs/aegis-waf.db"
