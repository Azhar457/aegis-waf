[global]
port_http = 80
port_https = 443
max_body_size = 10485760
default_rate_limit = 600
log_dir = "./logs"

[tls]
mode = "local_ca"
cert_dir = "./certs"

[[vhosts]]
name = "aegis-demo"
hosts = ["*.aegiswaf.demo"]
backend = "127.0.0.1:8080"
rate_limit_tiers = []
rules = ["SQLI-*", "XSS-*", "LFI-*", "RFI-*"]
blocked_countries = ["US", "DE"]
geoblock_type = "Allowlist"
ssl = "Auto (Local CA)"
max_body = "10MB"
rate_limit = "600 req/min"

[[vhosts.custom_rules]]
id = "CR-123"
name = "Block Admin Path"
condition_type = "path"
operator = "contains"
condition_value = "/wp-admin"
action = "block"
action_value = ""
enabled = true

[[vhosts.custom_rules]]
id = "CR-456"
name = "Redirect Login Page"
condition_type = "path"
operator = "starts_with"
condition_value = "/login.php"
action = "redirect"
action_value = "https://google.com"
enabled = true

[vhosts.logging]
enabled = true
db_path = "logs/aegis-waf.db"
