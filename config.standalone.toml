# ============================================================
# Aegis WAF — Standalone Agent Configuration
# ============================================================
# This config is optimized for small VPS (1 Core, 2GB RAM).
# No ClickHouse, no Dashboard — just the WAF proxy.
# RAM usage: ~30MB
# ============================================================

certificates = []

[global]
port_http = 80
port_https = 443
max_body_size = 10485760        # 10MB
default_rate_limit = 600        # requests per minute
log_dir = "/var/log/aegis-waf"
log_level = "security"
waf_enabled = true

# ── Logging Mode ─────────────────────────────────────────────
# Modes:
#   "file"       → Write JSON logs to local file only (0 MB overhead)
#   "remote"     → Write to file + push batches to central Controller
#   "clickhouse" → Direct insert to ClickHouse (requires Docker)
[logging]
mode = "file"
log_path = "/var/log/aegis-waf/aegis.log"
max_log_size_mb = 50            # Rotate when file exceeds this size
max_log_files = 5               # Keep max N rotated files
blocklist_path = "/var/log/aegis-waf/blocklist.json"

# Uncomment for remote monitoring from your central server:
# mode = "remote"
# remote_url = "http://your-central-server:8080"
# push_interval_secs = 300      # Push every 5 minutes
# push_batch_size = 100         # Max entries per push

# ── Component Toggles ────────────────────────────────────────
# Disable unused components to save RAM
[components]
dashboard = false               # No dashboard UI on agent VPS
clickhouse = false              # No ClickHouse database needed
service_discovery = false       # Skip Docker/system port scanning
geoip = true                    # Keep GeoIP blocking enabled

# ── TLS ──────────────────────────────────────────────────────
[tls]
mode = "local_ca"
cert_dir = "./certs"

# ── Virtual Hosts ────────────────────────────────────────────
# Configure your client's web application here
[[vhosts]]
name = "client-app"
hosts = ["yourdomain.com", "www.yourdomain.com"]
backend = "127.0.0.1:8000"     # Laravel / Node.js / Django port
rules = ["SQLI-*", "XSS-*", "LFI-*", "RFI-*", "SSRF-*", "CMDI-*", "BOT-*"]
blocked_countries = []
geoblock_type = "Blocklist"
ssl = "Auto (Local CA)"
max_body = "10MB"
rate_limit = "600 req/min"
custom_rules = []

[vhosts.logging]
enabled = true
db_path = "/var/log/aegis-waf/aegis-waf.db"

