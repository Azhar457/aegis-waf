services:
  aegis-controller:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: aegis_controller
    command: ["/app/aegis-waf", "controller"]
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
    volumes:
      - ./config.toml:/app/config.toml
      - ./logs:/var/log/aegis-waf
